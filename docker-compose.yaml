services:
  # -------------------------------------------------------
  # 1. POSTGRESQL + PGVECTOR (Kho chứa dữ liệu & Vector)
  # -------------------------------------------------------
  postgres:
    image: ankane/pgvector:latest # Image đặc biệt cài sẵn Extension Vector
    container_name: sneaker-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER} # Đọc từ file .env, nếu không có thì lấy mặc định 'admin'
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432" # Cổng kết nối DB chuẩn
    volumes:
      - postgres_data:/var/lib/postgresql/data # Mount ổ cứng ảo để không mất dữ liệu khi tắt Docker
    networks:
      - data-network


  # -------------------------------------------------------
  # 2. PGADMIN 4 (Giao diện quản lý Database)
  # -------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com # Tài khoản đăng nhập pgAdmin
      PGADMIN_DEFAULT_PASSWORD: root # Mật khẩu đăng nhập pgAdmin
    ports:
      - "5050:80" # Truy cập qua cổng 5050
    networks:
      - data-network

# Định nghĩa mạng nội bộ để các container nhìn thấy nhau bằng tên
networks:
  data-network:
    driver: bridge

# Định nghĩa ổ cứng ảo lưu dữ liệu DB
volumes:
  postgres_data:
